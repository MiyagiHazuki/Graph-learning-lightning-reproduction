# Pubmed Configuration for ProGNN (Simplified)
# Optimized for ProGNN execution only

# 基础运行参数
basic:
  seed: 10
  debug: true
  no_cuda: false

# 数据与攻击配置
data:
  dataset: pubmed
  attack: meta
  ptb_rate: 0.05

# 模型骨干网络 (GCN) 参数
model:
  hidden: 16
  dropout: 0.5

# 训练超参数
training:
  lr: 1e-2
  weight_decay: 5e-4
  epochs: 100

# ProGNN 核心算法参数
prognn:
  alpha: 0.3
  beta: 2.5
  gamma: 1
  lambda_: 0.001
  phi: 0
  inner_steps: 30
  outer_steps: 1
  lr_adj: 0.01
  symmetric: false
