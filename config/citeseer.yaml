# Citeseer Configuration for ProGNN (Simplified)
# Optimized for ProGNN execution only

# 基础运行参数
basic:
  seed: 10
  debug: false
  no_cuda: false

# 数据与攻击配置
data:
  dataset: citeseer
  attack: meta
  ptb_rate: 0.15

# 模型骨干网络 (GCN) 参数
model:
  type: elrgnn         # Options: prognn, elrgnn
  hidden: 16
  dropout: 0.5

# 训练超参数
training:
  lr: 0.01              # ELR-GNN GCN lr (Paper IV-A2: 1e-2)
  weight_decay: 5e-4
  epochs: 500          # ELR-GNN epochs (Paper IV-A2: 1000)

# ELR-GNN 核心算法参数 (Paper Section III-B & IV-A2)
elrgnn:
  rank: 100               # Low-rank approximation dimension (d)
  epsilon: 0.001         # Sparsity threshold (epsilon)
  lambda_sim: 0.1        # Similarity regularization weight
  lambda_fr: 0.1         # Frobenius regularization weight
  lr_adj: 0.01           # SGD learning rate for U (Paper IV-A2: SGD determined by CV)
  symmetric: false       # Not explicitly used in ELR-GNN but kept for compatibility

# ProGNN 核心算法参数 (Legacy / Comparison)
prognn:
  alpha: 5e-4            # L1 constraint weight
  beta: 1.5              # Nuclear norm weight
  gamma: 1               # L2 constraint weight
  lambda_: 0.0001        # Feature smoothing weight
  phi: 0                 # Symmetry loss weight
  inner_steps: 2
  outer_steps: 1
  lr_adj: 0.01
  symmetric: false
